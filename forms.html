<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section style="width: 100%;  text-align: center;">
    <div style="width: 30%;background-color: cornflowerblue; color: black; ">
       <br><br>
        <h1>Contact Us</h1>
        <form action="" method="">
        <input type="text" placeholder="Enter name" style="width: 80%; height: 30px;">
         <br><br>
        <input type="tel" placeholder="enter number" style="width: 80%; height: 30px">
         <br><br>
        <input type="text" placeholder="Location" list="Location" style="width: 80%; height: 30px">
         <br><br>
        <datalist id="Location" >
            <option>Vizag</option>
            <option>Banglore</option>
            <option>Chennai</option>
            <option>Hyderabad</option>
            <option>Mumbai</option>
            <option>Pune</option>
        </datalist>
        <input type="email" placeholder="enter email" style="width: 80%; height: 30px">
        <br><br>
        <select style="width: 80%; height: 30px" >
            <option hidden>Interested Course</option>
            <option>UI-UX Designing</option>
            <option>Mern Full stack</option>
            <option>Java Full stack</option>
            <option>Python Full stack</option>
            <option>AI full stack</option>
        </select>
        <br><br>
        <textarea rows="5" cols="30" placeholder="message"></textarea>
        <br><br>
        <input type="submit" >
    </form>
    </div>
    </section>
</body>
</html>
